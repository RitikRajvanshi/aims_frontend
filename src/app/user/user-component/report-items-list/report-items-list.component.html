<ngx-spinner size="large" bdColor="rgba(0, 0, 0, 0.8)"  color="#fff" type="ball-clip-rotate">
    <p style="font-size: 20px; color: #fff;">Loading ...</p>
</ngx-spinner>
<section class="content-header">
    <div class="header-icon"><i class="fa fa-files-o" style="color:#FF00FF" aria-hidden="true"></i></div>
    <div class="header-title">
        <h1>Items List</h1>
    </div>
</section>
<div class="container-fluid">
    <div class="data-content" *ngIf="isDataorNot" >
        <div class="page-background-h">
           <div class="data-control-box">
            
           
            <div class="container-fluid mt-0 pt-0 mb-0">
                <div class="row">
                    <div class="col-lg-12 col-12 col-sm-12">
                        <div class="container-fluid">
                    <div class="row">
                        <div class="input-group my-3  search-container">

                            <input type="text" class=" data-control form-control   mr-2"
                                placeholder="Enter Any Text...." aria-describedby="basic-addon2"
                                [(ngModel)]="searchTerm" (input)="applyFilter()"  >
                            <button type="submit"><i class="fa fa-filter"></i></button>
                            <!-- <input type="text" class="form-control" placeholder="Enter Supplier Name"  aria-describedby="basic-addon2" [(ngModel)]="searchItem2" (ngModelChange)="EmptySearchItem()"> -->

                        </div>
                    </div>
                </div>

                    </div>
                </div>
            </div>
            
            <div class="container-fluid">
                <div class="row">
                    <div class="col-lg-12 col-12 col-sm-12  ">
                        <div class=" table-responsive overflow-auto">
                            <table class="table table-striped table-bordered table-hover small-font" >
                                <thead>
                                    <tr>
                                        <th scope="col" style="width:5%">S.NO.</th>
                                        <th scope="col" >Item Code</th>
                                        <th scope="col">Category</th>
                                        <th scope="col" >Item Name</th>
                                        <th scope="col" style="width:10%">Created Date</th>
                                        <th scope="col"style="width:15%">Warranty End Date</th>
                
                                    </tr>
                                </thead>
                                <tbody>
                
                                    <tr *ngFor="let data of filtereditemList| paginate:
                                    {itemsPerPage: tableSize,
                                      currentPage: page, totalItems:empltyDataList.length}; let i = index ; ">
                
                                        <th scope="row">{{ (page - 1) * tableSize + i +1 }}</th>
                                        <td>{{data.item_code}}</td>
                                        <td>{{data.category_name}}</td>
                                        <td>{{data.item_name}}</td>
                                        <td>{{data.created_date | date: 'dd-MM-yyyy'}}</td>
                                        <td>{{data.warrantyend_date}}</td>
                                        
                                    </tr>
                                       
                
                
                
                                </tbody>    
                            </table>
                        </div>

                    </div>
                </div>
            </div>   
            <div class="container-fluid mt-4 mb-4 ">
                    <div class="row">
                        <div class="col-lg-10  d-flex">
                            <div class="pagination "  class="active" >
                                <pagination-controls    previousLabel="Prev" nextLabel="Next" (pageChange)="ontableDatachange($event)">
                                    </pagination-controls>
                        
                            </div>
                        </div>
                        <div class="col-lg-2   ml-auto d-flex">
                            <div class="form-group  select-size">
                                <p class="mb-2  report-headings">Items/page</p>
                                <select class=" data-control-select ml-2  select-size form-control"
                                (change)="ontableSizechange($event)" >
                                <option class="select-border" *ngFor=" let size of tableSizes" [value]="size">
                                    {{size}}
                                </option>
                            </select>
                            </div>
                        </div>
                    </div>
               </div> 
           </div>
        </div> 
    </div>
    <div class="noData text-center container-fluid" *ngIf="!isDataorNot" style="height: 90vh;">
        <h1 class="text-danger">No data found</h1>
    </div>
</div>
