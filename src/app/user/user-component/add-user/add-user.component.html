<section class="content-header">
    <div class="header-icon"><i class="fa fa-user  text-danger" aria-hidden="true"></i></div>
    <div class="header-title">
        <h1>Add User</h1>
    </div>
</section>
<div class="container-fluid">
    <div class="data-content">
        <div class="page-background-h">
            <div class="flex-box">
                <div class="col-md-12 col-sm-12 col-lg-5 mt-5 " [formGroup]="adduserForm">
                    <div class="data-form">
                        <h1 class="text-center form-heading mb-4 mt-3">Add User</h1>

                        <div class="form-group  m-2">
                            <label for="user_name" class="form-label">User Name:<sup>*</sup></label>
                            <input type="text" id="user_name" class="form-control form-control-sm data-control " placeholder="Enter User Name"
                                formControlName="user_name" [(ngModel)]="userData.user_name"  (keydown)="NoSpaceallowedatstart($event)"/>

                            <div class="mandatory my-1 text-danger font-italic"
                                *ngIf="adduserForm.get('user_name').hasError('required') && adduserForm.get('user_name').touched">
                                Required</div>
                        </div>
                        <div class="form-group m-2">
                            <label for="user_email" class="form-label">Email:<sup>*</sup></label>
                            <input type="email" id="user_email" class="form-control form-control-sm data-control" placeholder="Enter Email "
                                formControlName="user_email" (keydown)="NoSpaceallowedatstart($event)" [(ngModel)]="userData.user_email"/>

                            <div class="mandatory my-1 text-danger font-italic"
                                *ngIf="adduserForm.get('user_email').hasError('required') && adduserForm.get('user_email').touched">
                                Required</div>

                            <div class="mandatory mandatory my-1 text-danger font-italic"
                                *ngIf="adduserForm.get('user_email').hasError('pattern') && adduserForm.get('user_email').touched">
                                Invalid Email address.</div>
                        </div>
                        <div class="form-group m-2">
                            <label for="privilege" class="form-label">Privilege:<sup>*</sup></label>
                            <select class="form-control form-control-sm data-control" id="privilege" #privilege formControlName="privilege_id"
                                [(ngModel)]="userData.privilege_id" (change)="privilageId(privilege.value)">
                                <option class="select-border" [selected]=true disabled hidden value=0>Select
                                </option>
                                <option class="select-border" *ngFor="let items of privilegedata"
                                    [value]='items.privilege_id'>{{items.privilege_name}}
                                </option>
                            </select>
                            <div class="mandatory my-1 text-danger font-italic"
                                *ngIf="adduserForm.get('privilege_id').hasError('pattern') && adduserForm.get('privilege_id').touched">
                                Required</div>
                        </div>
                        <div class="form-group m-2">
                            <label for="group" class="form-label">Department:<sup>*</sup></label>
                            <select class="form-control form-control-sm  form-control-sm data-control" id="group" formControlName="grp_id" #group
                                (change)="grpId(group.value)" [(ngModel)]="userData.grp_id">

                                <option class="select-border" [selected]=true disabled hidden value=0>Select
                                </option>
                                <option class="select-border" *ngFor=" let items of groupdata"
                                    [value]='items.grp_id'>{{items.grp_name}}</option>

                                <!-- <div class="mandatory my-1 text-danger font-italic"
                                    *ngIf="adduserForm.get('grp_id').hasError('pattern') && adduserForm.get('grp_id').touched">
                                    Required.</div> -->
                            </select>
                            <div class="mandatory my-1 text-danger font-italic"
                                *ngIf="adduserForm.get('grp_id').hasError('pattern') && adduserForm.get('grp_id').touched">
                                Required</div>
                        </div>
                        <div class="form-group m-2">
                            <label for="design" class="form-label">Designation:<sup>*</sup></label>
                            <select class=" data-control form-control-sm form-control" id="design" #design formControlName="designation_id"
                                (change)="designId(design.value)" [(ngModel)]="userData.designation_id">
                                <option class="select-border" [selected]=true disabled hidden value=0>Select
                                </option>
                                <option class="select-border" *ngFor=" let items of designationdata"
                                    [value]='items.designation_id'>
                                    {{items.designation_name}}</option>
                            </select>

                            <div class="mandatory my-1 text-danger font-italic"
                                *ngIf="adduserForm.get('designation_id').hasError('pattern') && adduserForm.get('designation_id').touched">
                                Required</div>
                        </div>

                        <div class="data-form-btn">
                            <div class="form-group text-center ">
                                <button class="btn btn-data-login btn-block" (click)="addUserfunction()">Add</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
