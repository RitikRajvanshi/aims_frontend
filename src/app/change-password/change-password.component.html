<div class="login-background">
    <div class="box">
        <div class="logincontainer">
            <div class="login-header">
                <img src="./assets/images/aim-justified-logo3.png" class="mx-auto d-block">
                <hr/>

                  <h2>Change Password</h2>
            </div>

              <form class="login-content" [formGroup]="changePasswordForm" (submit)="forgotPassword(changePasswordForm.value)" (keyup.enter)="forgotPassword(changePasswordForm.value)">
                <div class="form-group my-3" >
                    <label for="" class="form-label">Username/Email:</label>
                    <input type="text" id="useremail" #useremail autocomplete="false"  class="form-control login-control"  (keydown)="NoSpaceallowedatstart($event)" placeholder="Enter username/emailid"  formControlName="user_email" />
                    <i class="fa fa-user icon-option" aria-hidden="true"></i>
                    <span class="mandatory ml-2 font-italic" *ngIf="changePasswordForm.controls['user_email'].touched && changePasswordForm.controls['user_email'].invalid" style="color:red; font-size: 12px;">Required.</span>
                    <span class="mandatory ml-2 font-italic" *ngIf="userNotFound" style="color:red; font-size: 14px;">User not found!</span>
                    
                </div>

                <div class="form-group my-3" >
                    <label for="" class="form-label">Old Password:</label>
                    <input type="text" id="useremail"  autocomplete="false"  class="form-control login-control" placeholder="Enter old password"  formControlName="old_password"  (keydown)="NoSpaceallowedatstart($event)"/>
                    <i class="fa fa-user icon-option" aria-hidden="true"></i>
                    <span class="mandatory ml-2 font-italic" *ngIf="changePasswordForm.controls['old_password'].touched && changePasswordForm.controls['old_password'].invalid" style="color:red; font-size: 12px;">Required.</span>
                    <span class="mandatory ml-2 font-italic" *ngIf="wrongPassword" style="color:red; font-size: 14px;">Incorrect Password!</span>
                </div>

                <div class="form-group my-3" >
                    <label for="" class="form-label">New Password:</label>
                    <input type="text" id="useremail" autocomplete="false"  class="form-control login-control" placeholder="Enter new password"  formControlName="new_password"  (keydown)="NoSpaceallowedatstart($event)"/>
                    <i class="fa fa-user icon-option" aria-hidden="true"></i>
                    <span class="mandatory ml-2 font-italic" *ngIf="changePasswordForm.controls['new_password'].touched && changePasswordForm.controls['new_password'].invalid" style="color:red; font-size: 12px;">Required.</span>
                    <span class="mandatory ml-2 font-italic" *ngIf="samePassword" style="color:red; font-size: 14px;">New Password can not be same as old password!</span>

                </div>
           

                <div class="form-group text-center">
                   <button  type="submit" class="btn btn-custom-login btn-block text-white">Submit</button>
                </div>

                <div class="login-footer d-flex justify-content-between mt-3">
                    <div class="form-check">
                      <label for="rememberme" class="form-check-label">
                       <a routerLink="../login" (click)="clearAll()">Login</a>
                      </label>
                    </div>
              </div>
            </form>

        </div>
    </div>
    
</div>
